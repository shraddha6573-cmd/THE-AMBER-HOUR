<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detective AI — Case Files</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14110D;
  --ink-2:#1B1712;
  --ink-3:#231D16;
  --paper:#EAE0C4;
  --paper-dim:#D8C9A0;
  --paper-line:#c9b98a;
  --blood:#8A2530;
  --blood-bright:#B8323F;
  --brass:#B4903D;
  --brass-bright:#D8B15C;
  --teal:#24413F;
  --teal-bright:#356460;
  --text:#ECE3CB;
  --text-muted:#9C9078;
  --text-faint:#6d6552;
  --font-display:'Special Elite', cursive;
  --font-body:'Crimson Text', serif;
  --font-mono:'Courier Prime', monospace;
  --radius:3px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at 50% -10%, #2a241a 0%, transparent 55%),
    var(--ink);
  color:var(--text);
  font-family:var(--font-body);
  font-size:17px;
  line-height:1.5;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;inset:0;
  pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
  opacity:.35;
  z-index:9000;
  mix-blend-mode:overlay;
}
@media (prefers-reduced-motion:no-preference){
  .lamp-flicker{animation:flicker 7s infinite;}
}
@keyframes flicker{
  0%,93%,100%{opacity:1;}
  94%{opacity:.85;}
  95%{opacity:1;}
  96%{opacity:.7;}
  97%{opacity:1;}
}
h1,h2,h3,.font-display{font-family:var(--font-display);letter-spacing:.02em;font-weight:400;}
.mono{font-family:var(--font-mono);}
::selection{background:var(--blood);color:var(--paper);}
a{color:var(--brass-bright);}
button{font-family:var(--font-body);cursor:pointer;}
button:focus-visible, [tabindex]:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline:2px solid var(--brass-bright); outline-offset:2px;
}
.hidden{display:none !important;}

/* ===== Layout shell ===== */
#app{max-width:1180px;margin:0 auto;padding:18px 20px 60px;position:relative;z-index:1;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:linear-gradient(180deg,var(--ink-3),var(--ink-2));
  border:1px solid #35301f;border-radius:var(--radius);
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand .badge{
  width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--brass-bright), var(--brass) 60%, #7a5f22 100%);
  display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink);
  box-shadow:0 0 0 2px #000 inset, 0 2px 6px rgba(0,0,0,.5);
}
.brand h1{font-size:19px;margin:0;color:var(--brass-bright);}
.brand small{display:block;color:var(--text-faint);font-size:11px;letter-spacing:.12em;text-transform:uppercase;}
.nav-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.nav-tabs button{
  background:transparent;border:1px solid #3a3424;color:var(--text-muted);
  padding:7px 12px;border-radius:var(--radius);font-size:13px;letter-spacing:.03em;
  transition:.15s;
}
.nav-tabs button:hover{border-color:var(--brass);color:var(--paper);}
.nav-tabs button.active{background:var(--brass);color:var(--ink);border-color:var(--brass);font-weight:700;}
.hud{display:flex;align-items:center;gap:14px;font-family:var(--font-mono);font-size:13px;color:var(--paper-dim);}
.hud .clock{color:var(--blood-bright);font-weight:700;}
.hud .clock.low{animation:flicker 1s infinite;}
.iconbtn{background:none;border:1px solid #3a3424;color:var(--text-muted);border-radius:var(--radius);padding:6px 9px;font-size:12px;}
.iconbtn:hover{color:var(--paper);border-color:var(--brass);}

/* ===== Views ===== */
.view{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.panel{
  background:linear-gradient(180deg, var(--ink-3), var(--ink-2));
  border:1px solid #35301f;border-radius:var(--radius);
  padding:22px;margin-bottom:16px;
}
.section-title{
  font-family:var(--font-display);color:var(--brass-bright);font-size:15px;
  letter-spacing:.1em;text-transform:uppercase;margin:0 0 14px;
  border-bottom:1px solid #3a3424;padding-bottom:8px;
}

/* HOME */
.hero{
  text-align:center;padding:50px 20px 40px;position:relative;
}
.hero h1{font-size:clamp(30px,5vw,52px);color:var(--paper);margin:0 0 6px;text-shadow:0 2px 0 #000;}
.hero .tag{color:var(--blood-bright);font-family:var(--font-mono);letter-spacing:.15em;text-transform:uppercase;font-size:13px;}
.hero p.lede{max-width:560px;margin:18px auto 0;color:var(--text-muted);font-style:italic;font-size:18px;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;max-width:760px;margin:34px auto 0;}
.menu-btn{
  background:var(--ink-3);border:1px solid #3a3424;color:var(--paper);
  padding:18px 16px;border-radius:var(--radius);text-align:left;font-size:16px;
  display:flex;align-items:center;gap:12px;transition:.15s;
}
.menu-btn:hover{border-color:var(--brass-bright);background:#26210f;transform:translateY(-1px);}
.menu-btn .ic{font-size:22px;}
.menu-btn small{display:block;color:var(--text-faint);font-size:12px;font-family:var(--font-mono);margin-top:2px;}
.menu-btn.primary{background:linear-gradient(180deg,var(--blood-bright),var(--blood));border-color:#5c1620;color:var(--paper);}
.menu-btn.primary small{color:#e8b9bd;}
.diff-row{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
.diff-chip{padding:8px 18px;border-radius:20px;border:1px solid #3a3424;background:var(--ink-3);color:var(--text-muted);font-family:var(--font-mono);font-size:13px;}
.diff-chip.active{background:var(--brass);color:var(--ink);border-color:var(--brass);font-weight:700;}

.stats-strip{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:26px;font-family:var(--font-mono);font-size:13px;color:var(--text-faint);}
.stats-strip b{color:var(--brass-bright);display:block;font-size:20px;font-family:var(--font-display);}

/* CASE SELECT */
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:6px;}
.case-card{
  background:var(--ink-3);border:1px solid #3a3424;border-radius:var(--radius);
  padding:18px 16px;text-align:left;position:relative;transition:.15s;
  display:flex;flex-direction:column;gap:4px;
}
.case-card:hover{border-color:var(--brass-bright);transform:translateY(-2px);background:#26210f;}
.case-card .case-icon{font-size:30px;margin-bottom:6px;}
.case-card .case-crime{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--blood-bright);}
.case-card b{font-family:var(--font-display);color:var(--paper);font-size:16px;margin:2px 0 4px;}
.case-card .case-tagline{color:var(--text-faint);font-size:13px;font-style:italic;}
.solved-tag{
  position:absolute;top:10px;right:10px;background:var(--brass);color:var(--ink);
  font-size:10px;padding:3px 7px;border-radius:8px;font-family:var(--font-mono);font-weight:700;
}

/* BRIEFING */
.briefing-card{max-width:700px;margin:0 auto;}
.briefing-card .stamp{
  display:inline-block;border:2px solid var(--blood-bright);color:var(--blood-bright);
  padding:3px 10px;transform:rotate(-4deg);font-family:var(--font-mono);font-weight:700;letter-spacing:.1em;
  font-size:12px;margin-bottom:14px;
}
.briefing-card p{color:var(--paper-dim);}
.photo-frame{
  width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#3a3424,#1c1810);
  display:flex;align-items:center;justify-content:center;font-size:46px;margin:0 auto 16px;border:3px solid var(--brass);
}

/* SCENE */
.loc-tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
.loc-tabs button{
  flex:0 0 auto;background:var(--ink-3);border:1px solid #3a3424;color:var(--text-muted);
  padding:9px 14px;border-radius:var(--radius);font-size:14px;white-space:nowrap;
}
.loc-tabs button.active{background:var(--teal-bright);border-color:var(--teal-bright);color:var(--paper);font-weight:700;}
.loc-desc{color:var(--text-muted);font-style:italic;margin-bottom:16px;}
.object-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.object-card{
  background:var(--ink-3);border:1px solid #3a3424;border-radius:var(--radius);
  padding:16px 12px;text-align:center;transition:.15s;position:relative;
}
.object-card:hover{border-color:var(--brass);transform:translateY(-2px);}
.object-card .ic{font-size:30px;display:block;margin-bottom:8px;}
.object-card .name{font-size:13px;color:var(--paper);}
.object-card.done{opacity:.55;}
.object-card .found-tag{
  position:absolute;top:6px;right:6px;background:var(--brass);color:var(--ink);
  font-size:9px;padding:2px 5px;border-radius:8px;font-family:var(--font-mono);font-weight:700;
}

/* SUSPECTS */
.suspect-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.suspect-card{
  background:var(--ink-3);border:1px solid #3a3424;border-radius:var(--radius);
  padding:16px;text-align:center;transition:.15s;
}
.suspect-card:hover{border-color:var(--brass);}
.suspect-card .portrait{
  width:64px;height:64px;border-radius:50%;margin:0 auto 10px;
  background:radial-gradient(circle at 35% 30%, #3f3928, #1c1810);
  display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid var(--brass);
}
.suspect-card .role{color:var(--text-faint);font-size:12px;font-family:var(--font-mono);margin-top:2px;}
.chat-wrap{display:flex;flex-direction:column;height:520px;max-height:70vh;}
.chat-header{display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px solid #3a3424;margin-bottom:10px;}
.chat-log{flex:1;overflow-y:auto;padding:10px 4px;display:flex;flex-direction:column;gap:10px;}
.bubble{max-width:78%;padding:10px 13px;border-radius:10px;font-size:15px;line-height:1.45;}
.bubble.you{align-self:flex-end;background:var(--teal-bright);color:var(--paper);border-bottom-right-radius:2px;}
.bubble.them{align-self:flex-start;background:var(--paper);color:#241f16;border-bottom-left-radius:2px;font-family:var(--font-body);}
.bubble.them.thinking{color:#5b5340;font-style:italic;}
.bubble .who{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;opacity:.65;margin-bottom:3px;font-family:var(--font-mono);}
.chat-input-row{display:flex;gap:8px;margin-top:10px;}
.chat-input-row input{
  flex:1;background:var(--ink);border:1px solid #3a3424;color:var(--text);
  padding:11px 12px;border-radius:var(--radius);font-family:var(--font-body);font-size:15px;
}
.chat-input-row button{background:var(--brass);border:none;color:var(--ink);padding:0 18px;border-radius:var(--radius);font-weight:700;}
.chat-input-row button:disabled{opacity:.5;cursor:not-allowed;}
.present-row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.present-row select{background:var(--ink);color:var(--text);border:1px solid #3a3424;border-radius:var(--radius);padding:7px;font-size:13px;flex:1;min-width:160px;}
.present-row button{background:var(--blood-bright);border:none;color:var(--paper);padding:7px 12px;border-radius:var(--radius);font-size:13px;}

/* EVIDENCE BOARD */
.board-wrap{position:relative;background:
  radial-gradient(circle at 20% 20%, rgba(255,255,255,.03), transparent 40%),
  repeating-linear-gradient(45deg, #3a3020 0 2px, #362c1e 2px 4px);
  border:10px solid #4a3c26;border-radius:4px;padding:24px;min-height:420px;
}
.board-cols{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media (max-width:700px){.board-cols{grid-template-columns:1fr;}}
.board-col h4{font-family:var(--font-display);color:var(--brass-bright);font-size:13px;text-transform:uppercase;letter-spacing:.1em;margin:0 0 10px;}
.pin-card{
  background:var(--paper);color:#241f16;border-radius:2px;padding:10px 12px;margin-bottom:10px;
  box-shadow:0 3px 8px rgba(0,0,0,.5);position:relative;font-size:13px;cursor:pointer;
  transform:rotate(var(--r,-1deg));transition:.15s;border:1px solid #c9b98a;
}
.pin-card:nth-child(even){--r:1deg;}
.pin-card:hover{transform:rotate(0deg) scale(1.02);z-index:2;}
.pin-card.selected{outline:2px solid var(--blood-bright);}
.pin-card::before{
  content:"📌";position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:16px;
}
.pin-card b{display:block;font-family:var(--font-display);font-size:13px;margin-bottom:3px;}
.pin-card .desc{color:#4a4330;font-size:12.5px;}
.connections-hint{color:var(--text-faint);font-size:12px;margin-top:14px;font-family:var(--font-mono);text-align:center;}
.conn-list{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;}
.conn-chip{background:var(--ink-3);border:1px solid var(--blood-bright);color:var(--paper);font-size:12px;padding:5px 10px;border-radius:12px;font-family:var(--font-mono);}
.conn-chip button{background:none;border:none;color:var(--blood-bright);margin-left:6px;font-weight:700;}
.notes-area{width:100%;min-height:90px;background:var(--paper);color:#241f16;border:none;border-radius:2px;padding:12px;font-family:var(--font-mono);font-size:13px;margin-top:14px;resize:vertical;}

/* PUZZLE MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;
  z-index:5000;padding:20px;
}
.modal{
  background:var(--ink-2);border:1px solid var(--brass);border-radius:var(--radius);
  padding:26px;max-width:520px;width:100%;max-height:85vh;overflow:auto;
}
.modal h3{color:var(--brass-bright);margin-top:0;}
.slider-row{display:flex;align-items:center;gap:12px;margin:16px 0;}
.slider-row input[type=range]{flex:1;}
.decoded-box{
  background:var(--paper);color:#241f16;font-family:var(--font-mono);padding:14px;border-radius:2px;
  min-height:50px;font-size:15px;letter-spacing:.04em;word-break:break-word;
}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:16px auto;}
.keypad button{padding:14px;font-size:18px;background:var(--ink-3);border:1px solid #3a3424;color:var(--paper);border-radius:var(--radius);}
.keypad button:hover{border-color:var(--brass);}
.code-display{font-family:var(--font-mono);font-size:26px;letter-spacing:.3em;text-align:center;color:var(--brass-bright);margin:10px 0;min-height:34px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
.btn{background:var(--brass);border:none;color:var(--ink);padding:9px 16px;border-radius:var(--radius);font-weight:700;font-size:14px;}
.btn.ghost{background:transparent;border:1px solid #3a3424;color:var(--text-muted);}
.btn.danger{background:var(--blood-bright);color:var(--paper);}
.feedback{margin-top:10px;font-size:13px;font-family:var(--font-mono);}
.feedback.ok{color:#8fce8f;}
.feedback.bad{color:var(--blood-bright);}

/* ACCUSATION */
.accuse-grid{display:grid;grid-template-columns:1fr;gap:18px;max-width:520px;margin:0 auto;}
.accuse-field label{display:block;font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin-bottom:6px;}
.accuse-field select{width:100%;background:var(--ink-3);color:var(--paper);border:1px solid #3a3424;padding:12px;border-radius:var(--radius);font-size:15px;}
.accuse-warning{text-align:center;color:var(--blood-bright);font-family:var(--font-mono);font-size:13px;margin-top:6px;}

/* RESULT */
.result-hero{text-align:center;padding:30px 10px;}
.result-hero .verdict{font-family:var(--font-display);font-size:38px;margin:0 0 8px;}
.verdict.win{color:#8fce8f;}
.verdict.lose{color:var(--blood-bright);}
.result-body{max-width:600px;margin:0 auto;color:var(--paper-dim);}
.score-row{display:flex;justify-content:center;gap:30px;margin:20px 0;flex-wrap:wrap;font-family:var(--font-mono);text-align:center;}
.score-row b{display:block;color:var(--brass-bright);font-size:24px;font-family:var(--font-display);}
.achv-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
.achv{background:var(--ink-3);border:1px solid var(--brass);color:var(--brass-bright);font-size:12px;padding:6px 12px;border-radius:14px;font-family:var(--font-mono);}

/* LEADERBOARD */
table.lb{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:13px;}
table.lb th{text-align:left;color:var(--text-faint);text-transform:uppercase;font-size:11px;letter-spacing:.06em;padding:8px;border-bottom:1px solid #3a3424;}
table.lb td{padding:10px 8px;border-bottom:1px solid #26221a;color:var(--paper-dim);}
table.lb tr:hover td{background:#221d13;}
.empty-note{color:var(--text-faint);font-style:italic;text-align:center;padding:20px;}

/* toast */
#toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink-3);border:1px solid var(--brass);color:var(--paper);
  padding:12px 20px;border-radius:var(--radius);font-family:var(--font-mono);font-size:13px;
  opacity:0;transition:.3s;z-index:6000;pointer-events:none;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.footer-note{text-align:center;color:var(--text-faint);font-size:11px;margin-top:30px;font-family:var(--font-mono);}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="badge lamp-flicker">🔎</div>
      <div>
        <h1>DETECTIVE AI</h1>
        <small>Case Files</small>
      </div>
    </div>
    <div class="nav-tabs" id="navTabs"></div>
    <div class="hud" id="hud"></div>
  </div>
  <div id="viewRoot"></div>
  <div class="footer-note">Suspect dialogue generated live by Claude · Case data stored locally in your browser</div>
</div>
<div id="toast"></div>

<script>
/* =========================================================
   HELPERS USED BY CASE DATA
========================================================= */
function caesar(str,shift){
  shift=((shift%26)+26)%26;
  return str.replace(/[A-Z]/g,c=>String.fromCharCode((c.charCodeAt(0)-65+shift)%26+65));
}

const DIFFICULTY = {
  easy:{seconds:22*60, hints:5, label:"Easy"},
  medium:{seconds:15*60, hints:3, label:"Medium"},
  hard:{seconds:10*60, hints:2, label:"Hard"}
};

const CRIME_TEMPLATES = {
  murder:{
    win:"Your instincts were right. {culprit} murdered {victim}, driven by {motive}, using {method}. The evidence you gathered holds up.",
    lose:"Not quite. The real killer was {culprit}, driven by {motive}, using {method}. Your case fell apart under scrutiny — the wrong person may walk free."
  },
  theft:{
    win:"Case closed. {culprit} was behind the theft of {victim}, driven by {motive}, pulling it off by {method}.",
    lose:"Wrong call. The real thief was {culprit}, driven by {motive}, who pulled it off by {method}. {victim} is gone for good."
  },
  kidnapping:{
    win:"You cracked it. {culprit} was behind the disappearance of {victim}, driven by {motive}, and pulled it off by {method}.",
    lose:"Not this time. {culprit} was really behind it, driven by {motive}, and pulled it off by {method}. Your accusation won't hold up."
  },
  fraud:{
    win:"Case closed. {culprit} orchestrated it all against {victim}, driven by {motive}, by {method}.",
    lose:"Wrong call. {culprit} orchestrated it, driven by {motive}, by {method}. {victim} never got justice."
  }
};

/* =========================================================
   CASE DATA — 3 cases per difficulty tier
========================================================= */
const CASES = [

/* ============================= EASY ============================= */
{
  id:'easy_diamond', difficulty:'easy', crimeType:'theft', icon:'💎',
  title:"The Vanishing Diamond",
  tagline:"A flawless gem disappears from a locked display case.",
  victim:"the Star of Kolkata", victimRole:"Prized diamond, Lindqvist & Sons Jewelers",
  briefing:"During a private evening viewing at Lindqvist & Sons, the legendary 'Star of Kolkata' vanished from its sealed display case. The lock wasn't forced, the alarm never tripped, and only three people had access that night. Someone in this story is walking around with an eleven-carat secret.",
  culpritLabel:"The Thief", methodLabel:"How It Was Done",
  locations:[
    { id:"showroom", name:"Showroom Floor", icon:"🏬",

/* =========================================================
   UTIL
========================================================= */
function qs(sel,root=document){return root.querySelector(sel);}
function qsa(sel,root=document){return [...root.querySelectorAll(sel)];}
function fmtTime(sec){
  sec=Math.max(0,Math.round(sec));
  const m=Math.floor(sec/60), s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function toast(msg){
  const t=qs('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h=setTimeout(()=>t.classList.remove('show'),2600);
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Web Audio sound effects (no external files) */
let actx=null;
function beep(freq=440,dur=0.09,type='sine',vol=0.05){
  const settings = loadSettings();
  if(!settings.soundOn) return;
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.value=vol;
    o.connect(g); g.connect(actx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    o.stop(actx.currentTime+dur);
  }catch(e){}
}
const sfx = {
  click:()=>beep(320,0.05,'square',0.03),
  clue:()=>{beep(660,0.09,'triangle',0.05); setTimeout(()=>beep(880,0.12,'triangle',0.05),90);},
  error:()=>beep(140,0.18,'sawtooth',0.05),
  success:()=>{beep(523,0.1,'triangle',0.05); setTimeout(()=>beep(659,0.1,'triangle',0.05),100); setTimeout(()=>beep(784,0.16,'triangle',0.05),200);},
  send:()=>beep(400,0.05,'sine',0.03)
};

function startTimer(){
  stopTimer();
  timerHandle=setInterval(()=>{
    if(!state||state.finished) return;
    state.timeRemaining -= 1;
    if(state.timeRemaining<=0){
      state.timeRemaining=0;
      renderHud();
      stopTimer();
      toast("Time's up — you'll have to make your best guess.");
      goTo('accuse');
      return;
    }
    renderHud();
  },1000);
}
function stopTimer(){ if(timerHandle) clearInterval(timerHandle); timerHandle=null; }

function inspectObject(kase,loc,objId,root){
  const obj = loc.objects.find(o=>o.id===objId);
  const key = loc.id+':'+objId;
  const already = state.inspected.includes(key);
  if(!already){
    state.inspected.push(key);
    state.actionsUsed++;
    if(obj.clue && !state.cluesCollected.includes(obj.clue)){
      state.cluesCollected.push(obj.clue);
      state.score += 10;
      sfx.clue();
      checkAchievements();
    } else if(!obj.puzzle){
      sfx.click();
    }
    persistSave();
  } else {
    sfx.click();
  }
  if(obj.puzzle==='cipher' && !state.puzzlesSolved.cipher){ openCipherPuzzle(kase); return; }
  if(obj.puzzle==='code' && !state.puzzlesSolved.code){ openCodePuzzle(kase, kase.puzzles.code); return; }
  showInspectModal(obj);
}

}

/* ---- Cipher puzzle (generic, driven by kase.puzzles.cipher) ---- */
function openCipherPuzzle(kase){
  const cfg = kase.puzzles.cipher;
  const cipherText = caesar(cfg.plain, cfg.shift);
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`
    <div class="modal">
      <h3>🔐 ${cfg.title||'Decode the Note'}</h3>
      <p style="color:var(--paper-dim);font-size:14px;">${cfg.promptText||'This note is shifted using a simple letter cipher. Slide until it reads clearly, then confirm.'}</p>
      <p class="mono" style="color:var(--blood-bright);letter-spacing:.08em;">${cipherText}</p>
      <div class="slider-row">
        <span class="mono" style="font-size:12px;color:var(--text-faint)">Shift</span>
        <input type="range" min="0" max="25" value="0" id="shiftSlider">
        <span class="mono" id="shiftVal" style="width:26px;text-align:right;">0</span>
      </div>
      <div class="decoded-box" id="decodedBox">${cipherText}</div>
      <div id="cipherFeedback" class="feedback"></div>
      <div class="modal-actions">
        <button class="btn ghost" id="cipherClose">Close</button>
        <button class="btn" id="cipherConfirm">Confirm Decode</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const slider=qs('#shiftSlider',overlay), box=qs('#decodedBox',overlay), val=qs('#shiftVal',overlay);
  function update(){
    const n=parseInt(slider.value,10);
    val.textContent=n;
    box.textContent=caesar(cipherText,n);
  }
  slider.addEventListener('input',update);
  update();
  qs('#cipherClose',overlay).addEventListener('click',()=>{overlay.remove();});
  qs('#cipherConfirm',overlay).addEventListener('click',()=>{
    const n=parseInt(slider.value,10);
    const decoded=caesar(cipherText,n);
    const fb=qs('#cipherFeedback',overlay);
    if(decoded.trim().toUpperCase()===cfg.plain){
      sfx.success();
      state.puzzlesSolved.cipher=true;
      if(!state.cluesCollected.includes(cfg.clueId)){
        state.cluesCollected.push(cfg.clueId); state.score+=20;
      }
      persistSave(); checkAchievements();
      fb.textContent='Decoded! The note now reads clearly.'; fb.className='feedback ok';
      setTimeout(()=>{ overlay.remove(); renderHud(); toast('🔓 '+(cfg.rewardText||'Decoded — added to your evidence.')); },900);
    } else {
      sfx.error();
      fb.textContent='Not quite readable yet. Keep adjusting the shift.'; fb.className='feedback bad';
    }
  });
}

  let entered='';
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`

      <p style="color:var(--paper-dim);font-size:14px;">${cfg.promptText||'Enter the 4-digit code.'}</p>
      <div class="code-display" id="codeDisp">${'‑'.repeat((cfg.code||'0000').length)}</div>
      <div class="keypad" id="keypad">
        ${[1,2,3,4,5,6,7,8,9,'⌫',0,'✔'].map(k=>`<button data-k="${k}">${k}</button>`).join('')}
      </div>
      <div id="codeFeedback" class="feedback"></div>
      <div class="modal-actions"><button class="btn ghost" id="codeClose">Close</button></div>
    </div>
  `;
  document.body.appendChild(overlay);
  const disp=qs('#codeDisp',overlay);
  const codeLen=(cfg.code||'0000').length;
  function refresh(){
    disp.textContent = (entered.padEnd(codeLen,'‑')).split('').join(' ');
  }
  refresh();
  qs('#keypad',overlay).addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    const k=b.dataset.k;
    const fb=qs('#codeFeedback',overlay);
    if(k==='⌫'){ entered=entered.slice(0,-1); sfx.click(); }
    else if(k==='✔'){
      if(entered===cfg.code){
        sfx.success();
        state.puzzlesSolved.code=true;
        if(!state.cluesCollected.includes(cfg.clueId)){ state.cluesCollected.push(cfg.clueId); state.score+=20; }
        persistSave(); checkAchievements();
        fb.textContent='Correct!'; fb.className='feedback ok';
        setTimeout(()=>{overlay.remove(); renderHud(); toast('🔓 '+(cfg.rewardText||'Unlocked — new evidence added.'));},1000);
        return;
      } else {
        sfx.error(); fb.textContent='Incorrect code.'; fb.className='feedback bad'; entered='';
      }
    } else if(entered.length<codeLen){ entered+=k; sfx.click(); }
    refresh();
  });
  qs('#codeClose',overlay).addEventListener('click',()=>overlay.remove());
}

/* =========================================================
   SUSPECTS / CHAT
========================================================= */
let activeSuspectId=null;

function renderSuspectsList(root){
  const kase=getCase();
  root.innerHTML=`
    <div class="panel">
      <h2 class="section-title">Suspects — ${kase.title}</h2>
      <div class="suspect-grid">
        ${kase.suspects.map(s=>`
          <button class="suspect-card" data-sid="${s.id}">
            <div class="portrait">${s.portrait}</div>
            <div style="color:var(--paper);font-weight:600;">${s.name}</div>
            <div class="role">${s.role}</div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
  qsa('[data-sid]',root).forEach(b=>b.addEventListener('click',()=>{
    sfx.click(); activeSuspectId=b.dataset.sid; goTo('chat');
  }));
}

function buildSystemPrompt(kase,suspect){
  const known = state.cluesCollected.map(c=>kase.clueMeta[c]?.name).filter(Boolean).join(', ') || 'none yet';
  return `You are roleplaying as a character in a murder/crime mystery game. Stay fully in character at all times and never break the fourth wall or mention being an AI.

CHARACTER: ${suspect.persona}

CASE CONTEXT: Case title "${kase.title}". The central victim or subject of the crime is ${kase.victim} (${kase.victimRole}). You are being interrogated by a detective (the player) investigating this case.

RULES:
- Never explicitly confess to the crime even if you are guilty, unless the detective presents overwhelming, specific evidence AND directly accuses you by name — even then, stay in character about how you react (denial, breakdown, lawyering up, etc. depending on personality), don't just flatly admit guilt for game balance reasons.
- If you are NOT guilty, never falsely confess and never claim to know for certain who did it — you may share honest suspicions if it fits your character.
- Only answer based on what your character would plausibly know. Do not invent details that contradict the character description.
- If the player asks something unrelated to the case, respond briefly in character and redirect to the investigation.
- If the player presents strong evidence (mentions specific items from the case), react appropriately in character — get more nervous, defensive, or forthcoming as fits the personality.
- Keep responses conversational and fairly short (2-5 sentences), like real spoken dialogue, not essays.
- The detective has currently collected this evidence (for your awareness of what they might reference): ${known}.
- Never reference game mechanics, scoring, or that this is a game.`;
}

function renderChat(root){
  const kase=getCase();
  const suspect = kase.suspects.find(s=>s.id===activeSuspectId);
  if(!suspect){ goTo('suspects'); return; }
  if(!state.suspectChats[suspect.id]) state.suspectChats[suspect.id]=[];
  const history = state.suspectChats[suspect.id];

  root.innerHTML=`
    <div class="panel">
      <div class="chat-wrap">
        <div class="chat-header">
          <div class="portrait" style="width:44px;height:44px;font-size:22px;">${suspect.portrait}</div>
          <div>
            <div style="color:var(--paper);font-weight:600;">${suspect.name}</div>
            <div class="role">${suspect.role}</div>
          </div>
          <button class="iconbtn" style="margin-left:auto;" id="backToSuspects">← All Suspects</button>
        </div>
        <div class="chat-log" id="chatLog"></div>
        <div class="present-row">
          <select id="presentSelect">
            <option value="">Present evidence…</option>
            ${state.cluesCollected.map(c=>`<option value="${c}">${kase.clueMeta[c]?.icon||''} ${kase.clueMeta[c]?.name||c}</option>`).join('')}
          </select>
          <button id="presentBtn">Present</button>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Ask ${suspect.name} a question…" maxlength="300">
          <button id="sendBtn">Ask</button>
        </div>
      </div>
    </div>
  `;
  qs('#backToSuspects').addEventListener('click',()=>{sfx.click(); goTo('suspects');});

  function renderLog(){
    const log=qs('#chatLog');
    log.innerHTML = history.length? history.map(m=>`
      <div class="bubble ${m.role==='user'?'you':'them'}">
        <span class="who">${m.role==='user'?'You':suspect.name}</span>${escapeHtml(m.content)}
      </div>
    `).join('') : `<div style="color:var(--text-faint);font-style:italic;text-align:center;margin-top:30px;">You haven't questioned ${suspect.name} yet. Ask something.</div>`;
    log.scrollTop = log.scrollHeight;
  }
  renderLog();

  async function sendMessage(text){
    if(!text.trim()) return;
    sfx.send();
    history.push({role:'user',content:text.trim()});
    state.actionsUsed++;
    persistSave();
    renderLog();
    qs('#chatInput').value='';
    qs('#sendBtn').disabled=true;

    const thinkingBubble=document.createElement('div');
    thinkingBubble.className='bubble them thinking';
    thinkingBubble.innerHTML=`<span class="who">${suspect.name}</span>…thinking…`;
    qs('#chatLog').appendChild(thinkingBubble);
    qs('#chatLog').scrollTop=qs('#chatLog').scrollHeight;

    try{
      const apiMessages = history.map(m=>({role:m.role, content:m.content}));
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:400,
          system: buildSystemPrompt(kase,suspect),
          messages: apiMessages
        })
      });
      const data = await response.json();
      let reply = "…";
      if(data && data.content){
        reply = data.content.map(b=>b.type==='text'?b.text:'').join('').trim() || "…";
      } else if(data && data.error){
        reply = "(The suspect seems unwilling to respond right now. Try again in a moment.)";
      }
      thinkingBubble.remove();
      history.push({role:'assistant',content:reply});
      persistSave();
      renderLog();
      checkAchievements();
    }catch(e){
      thinkingBubble.remove();
      history.push({role:'assistant',content:"(Static on the line — try asking again.)"});
      renderLog();
    }finally{
      qs('#sendBtn').disabled=false;
    }
  }

  qs('#sendBtn').addEventListener('click',()=>sendMessage(qs('#chatInput').value));
  qs('#chatInput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendMessage(qs('#chatInput').value); });
  qs('#presentBtn').addEventListener('click',()=>{
    const sel=qs('#presentSelect');
    const clueId=sel.value;
    if(!clueId){ toast('Choose a piece of evidence first.'); return; }
    const meta=kase.clueMeta[clueId];
    sendMessage(`I want to present this evidence to you: ${meta.name}. What do you have to say about it?`);
    sel.value='';
  });
}

/* =========================================================
   EVIDENCE BOARD
========================================================= */
function renderEvidence(root){
  const kase=getCase();
  const clues = state.cluesCollected;
  const codeCfg = kase.puzzles && kase.puzzles.code;
  const showCodeButton = codeCfg && codeCfg.requiresClues && !state.puzzlesSolved.code &&
    codeCfg.requiresClues.every(id=>clues.includes(id));
  root.innerHTML=`
    <div class="panel">
      <h2 class="section-title">Evidence Board — ${kase.title}</h2>
      <p style="color:var(--text-faint);font-size:13px;">Click a clue, then click a suspect, to pin a connection between them. Click a connection chip to remove it.</p>
      ${showCodeButton ? `<div class="modal-actions" style="justify-content:flex-start;margin:6px 0 16px;"><button class="btn" id="unlockCodeBtn">🔓 You have everything you need — ${codeCfg.title||'Crack the Code'}</button></div>` : ''}
      <div class="board-wrap">
        <div class="board-cols">
          <div class="board-col">
            <h4>🗃 Clues (${clues.length})</h4>
            ${clues.length? clues.map(c=>`<div class="pin-card" data-clue="${c}"><b>${kase.clueMeta[c].icon} ${kase.clueMeta[c].name}</b><span class="desc">Tap to link to a suspect</span></div>`).join('') : `<div class="empty-note">No clues collected yet — explore the crime scene.</div>`}
          </div>
          <div class="board-col">
            <h4>🕴 Suspects</h4>
            ${kase.suspects.map(s=>`<div class="pin-card" data-suspect="${s.id}"><b>${s.portrait} ${s.name}</b><span class="desc">${s.role}</span></div>`).join('')}
          </div>
        </div>
        <div class="conn-list" id="connList"></div>
        <div class="connections-hint">Interrogation history and free notes below help you track your own theory.</div>
      </div>
      <textarea class="notes-area" id="notesArea" placeholder="Detective's notes — jot down your working theory here...">${escapeHtml(state.notes||'')}</textarea>
    </div>
  `;
  qs('#unlockCodeBtn')?.addEventListener('click',()=>{ sfx.click(); openCodePuzzle(kase, codeCfg); });

  function renderConnections(){
    const list=qs('#connList');
    list.innerHTML = state.connections.map((c,i)=>{
      const clueName = kase.clueMeta[c.clue]?.name||c.clue;
      const susp = kase.suspects.find(s=>s.id===c.suspect);
      return `<span class="conn-chip">${clueName} ↔ ${susp?susp.name:c.suspect}<button data-i="${i}">✕</button></span>`;
    }).join('') || `<span style="color:var(--text-faint);font-size:12px;font-family:var(--font-mono)">No connections pinned yet.</span>`;
    qsa('button[data-i]',list).forEach(b=>b.addEventListener('click',()=>{
      state.connections.splice(parseInt(b.dataset.i,10),1); persistSave(); renderConnections();
    }));
  }
  renderConnections();

  boardConnectDraft=null;
  qsa('.pin-card[data-clue]',root).forEach(card=>card.addEventListener('click',()=>{
    sfx.click();
    qsa('.pin-card',root).forEach(c=>c.classList.remove('selected'));
    boardConnectDraft={type:'clue',id:card.dataset.clue};
    card.classList.add('selected');
  }));
  qsa('.pin-card[data-suspect]',root).forEach(card=>card.addEventListener('click',()=>{
    if(boardConnectDraft && boardConnectDraft.type==='clue'){
      sfx.success();
      const exists = state.connections.some(c=>c.clue===boardConnectDraft.id && c.suspect===card.dataset.suspect);
      if(!exists){
        state.connections.push({clue:boardConnectDraft.id, suspect:card.dataset.suspect});
        state.score += 2;
        persistSave();
      }
      boardConnectDraft=null;
      qsa('.pin-card',root).forEach(c=>c.classList.remove('selected'));
      renderConnections();
    } else {
      sfx.click();
    }
  }));

  const notesArea=qs('#notesArea');
  let saveTimeout;
  notesArea.addEventListener('input',()=>{
    clearTimeout(saveTimeout);
    saveTimeout=setTimeout(()=>{ state.notes=notesArea.value; persistSave(); },500);
  });
}

/* =========================================================
   ACCUSATION
========================================================= */
function renderAccuse(root){
  const kase=getCase();
  root.innerHTML=`
    <div class="panel accuse-grid">
      <h2 class="section-title" style="text-align:center;">Final Accusation</h2>
      <p style="text-align:center;color:var(--text-muted);">Choose carefully. You only get one shot at this.</p>
      <div class="accuse-field">
        <label>${kase.culpritLabel||'The Culprit'}</label>
        <select id="accCulprit"><option value="">— Select a suspect —</option>${kase.suspects.map(s=>`<option value="${s.id}">${s.name} (${s.role})</option>`).join('')}</select>
      </div>
      <div class="accuse-field">
        <label>The Motive</label>
        <select id="accMotive"><option value="">— Select a motive —</option>${kase.motiveOptions.map(m=>`<option value="${m.id}">${m.label}</option>`).join('')}</select>
      </div>
      <div class="accuse-field">
        <label>${kase.methodLabel||'Method'}</label>
        <select id="accMethod"><option value="">— Select an option —</option>${kase.methodOptions.map(w=>`<option value="${w.id}">${w.label}</option>`).join('')}</select>
      </div>
      <div class="modal-actions" style="justify-content:center;">
        <button class="btn danger" id="accuseBtn">Make Accusation</button>
      </div>
      <div class="accuse-warning">This ends the investigation, win or lose.</div>
    </div>
  `;
  qs('#accuseBtn').addEventListener('click',()=>{
    const culprit=qs('#accCulprit').value, motive=qs('#accMotive').value, method=qs('#accMethod').value;
    if(!culprit||!motive||!method){ sfx.error(); toast('Select a suspect, motive, and '+(kase.methodLabel||'method').toLowerCase()+' before accusing.'); return; }
    finalizeCase(culprit,motive,method);
  });
}

function finalizeCase(culprit,motive,method){
  stopTimer();
  const kase=getCase();
  const sol=kase.solution;
  const correctCulprit = culprit===sol.culprit;
  const correctMotive = motive===sol.motive;
  const correctMethod = method===sol.method;
  const won = correctCulprit && correctMotive && correctMethod;

  let scoreBonus = 0;
  if(correctCulprit) scoreBonus+=40;
  if(correctMotive) scoreBonus+=20;
  if(correctMethod) scoreBonus+=20;
  const diffSeconds = DIFFICULTY[state.difficulty].seconds;
  const timeUsed = diffSeconds - state.timeRemaining;
  const speedBonus = won ? Math.max(0, Math.round((state.timeRemaining/diffSeconds)*40)) : 0;
  state.score += scoreBonus + speedBonus;
  state.finished = {won, culprit, motive, method, timeUsed};
  persistSave();

  // stats
  const stats=getStats();
  stats.gamesPlayed+=1;
  if(won){
    stats.casesSolved+=1;
    if(stats.bestTimeSec===null || timeUsed<stats.bestTimeSec) stats.bestTimeSec=timeUsed;
    if(!stats.solvedCaseIds.includes(kase.id)) stats.solvedCaseIds.push(kase.id);
  }
  stats.totalScore+=state.score;
  saveStats(stats);

  // leaderboard
  const lb=getLeaderboard();
  lb.push({won,score:state.score,timeUsed,difficulty:state.difficulty,caseId:kase.id,date:Date.now()});
  saveLeaderboard(lb);

  if(won) checkAchievements(true);
  clearSave();
  goTo('result');
}

/* =========================================================
   RESULT
========================================================= */
function buildResultText(kase,won,culpritId,motiveId,methodId){
  const tmpl = CRIME_TEMPLATES[kase.crimeType]||CRIME_TEMPLATES.murder;
  const str = won? tmpl.win : tmpl.lose;
  const nameFor = id => (kase.suspects.find(s=>s.id===id)||{}).name || '???';
  const motiveFor = id => ((kase.motiveOptions.find(m=>m.id===id)||{}).label || id).toLowerCase();
  const methodFor = id => ((kase.methodOptions.find(m=>m.id===id)||{}).label || id).toLowerCase();
  const finalCulprit = won ? culpritId : kase.solution.culprit;
  const finalMotive = won ? motiveId : kase.solution.motive;
  const finalMethod = won ? methodId : kase.solution.method;
  return str
    .replace('{culprit}', nameFor(finalCulprit))
    .replace('{victim}', kase.victim)
    .replace('{motive}', motiveFor(finalMotive))
    .replace('{method}', methodFor(finalMethod));
}

function renderResult(root){
  const kase=getCase();
  const f = state.finished;
  const text = buildResultText(kase, f.won, f.culprit, f.motive, f.method);

  root.innerHTML=`
    <div class="panel">
      <div class="result-hero">
        <div class="verdict ${f.won?'win':'lose'}">${f.won?'CASE CLOSED':'CASE UNSOLVED'}</div>
        <div class="result-body">
          <p>${text}</p>
        </div>
        <div class="score-row">
          <div><b>${state.score}</b>Score</div>
          <div><b>${fmtTime(f.timeUsed)}</b>Time Used</div>
          <div><b>${state.cluesCollected.length}</b>Clues Found</div>
          <div><b>${state.connections.length}</b>Connections Made</div>
        </div>
        ${state.achievements.length? `<div class="achv-row">${state.achievements.map(a=>`<span class="achv">🏅 ${a}</span>`).join('')}</div>`:''}
        <div class="modal-actions" style="justify-content:center;margin-top:26px;">
          <button class="btn" id="playAgainBtn">Choose Another Case</button>
          <button class="btn ghost" id="lbBtn">View Leaderboard</button>
          <button class="btn ghost" id="homeBtn2">Home</button>
        </div>
      </div>
    </div>
  `;
  qs('#playAgainBtn').addEventListener('click',()=>{ sfx.click(); goTo('caseSelect'); });
  qs('#lbBtn').addEventListener('click',()=>{ sfx.click(); goTo('leaderboard'); });
  qs('#homeBtn2').addEventListener('click',()=>{ sfx.click(); goTo('home'); });
}

/* =========================================================
   HINTS & ACHIEVEMENTS
========================================================= */
function showHint(){
  const kase=getCase();
  if(state.hintsLeft<=0){ sfx.error(); toast('No hints remaining.'); return; }
  state.hintsLeft--;
  const idx = kase.hints.length - state.hintsLeft - 1 >=0 ? (kase.hints.length-1-state.hintsLeft) : 0;
  const hint = kase.hints[Math.min(idx,kase.hints.length-1)] || kase.hints[0];
  persistSave(); renderHud();
  sfx.click();
  toast('💡 '+hint);
}

function grantAchievement(name){
  if(!state.achievements.includes(name)){
    state.achievements.push(name);
    toast('🏅 Achievement unlocked: '+name);
    sfx.success();
    persistSave();
  }
}
function checkAchievements(finishing){
  const kase=getCase();
  if(!kase) return;
  if(state.cluesCollected.length>=1) grantAchievement('First Clue');
  const totalClues = Object.keys(kase.clueMeta).length;
  if(state.cluesCollected.length>=totalClues-1) grantAchievement('Thorough Detective');
  if(state.puzzlesSolved.cipher) grantAchievement('Codebreaker');
  if(state.puzzlesSolved.code) grantAchievement('Lock Picker');
  if(Object.values(state.suspectChats).filter(h=>h&&h.length>0).length>=kase.suspects.length) grantAchievement('Grilled Every Suspect');
  if(finishing && state.finished && state.finished.won){
    grantAchievement('Case Closed');
    if(state.finished.timeUsed < DIFFICULTY[state.difficulty].seconds*0.4) grantAchievement('Speed Detective');
    const stats=getStats();
    if(stats.solvedCaseIds.length>=3) grantAchievement('Rising Detective');
    if(stats.solvedCaseIds.length>=CASES.length) grantAchievement('Master Detective');
  }
}

/* =========================================================
   INIT
========================================================= */
goTo('home');
</script>
